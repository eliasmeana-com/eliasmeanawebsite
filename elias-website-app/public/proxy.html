<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Secure Embed Proxy</title>
  <style>
    html, body { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background: #000; }
    #inner { width: 100%; height: 100%; border: none; display: block; }
    #overlay {
      position: absolute; top: 0; left: 0; width: 100%; height: 100%;
      background: rgba(0,0,0,0.9); z-index: 9999; display: flex;
      align-items: center; justify-content: center; color: #fff;
      font-family: system-ui, sans-serif; font-size: 14px;
      cursor: pointer; flex-direction: column; gap: 8px;
    }
    #overlay.hidden { display: none; }
  </style>
</head>
<body>
  <div id="overlay">
    <div style="font-size:32px;">▶</div>
    <div style="text-align:center;">Click to start — pop-ups are blocked</div>
  </div>
  <script>
    (function() {
      var params = new URLSearchParams(window.location.search);
      var targetUrl = params.get('url');
      if (!targetUrl) {
        document.body.innerHTML = '<div style="color:#fff;padding:40px;font-family:system-ui,sans-serif;">Missing ?url= parameter</div>';
        return;
      }

      var overlay = document.getElementById('overlay');

      overlay.addEventListener('click', function() {
        overlay.classList.add('hidden');

        var inner = document.createElement('iframe');
        inner.id = 'inner';
        inner.allow = 'encrypted-media; picture-in-picture; fullscreen; autoplay';
        inner.setAttribute('allowfullscreen', 'true');
        inner.src = targetUrl;
        document.body.appendChild(inner);
      });
    })();
  </script>
</body>
</html>
